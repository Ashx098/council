<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      padding: 16px;
      min-width: 300px;
      background: #1e293b;
      color: #e2e8f0;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    h1 span {
      font-size: 20px;
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #334155;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6b7280;
      transition: background 0.3s ease;
    }
    
    .status-dot.ok {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }
    
    .status-dot.error {
      background: #ef4444;
      box-shadow: 0 0 6px #ef4444;
    }
    
    .status-text {
      font-size: 12px;
      color: #94a3b8;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
      transition: border-color 0.2s ease;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-secondary {
      background: #475569;
      color: #e2e8f0;
    }
    
    .btn-secondary:hover {
      background: #64748b;
    }
    
    .info {
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
    }
    
    .divider {
      height: 1px;
      background: #475569;
      margin: 16px 0;
    }
    
    .session-info {
      font-size: 11px;
      color: #64748b;
      padding: 8px 12px;
      background: #0f172a;
      border-radius: 6px;
    }
    
    .session-info code {
      color: #94a3b8;
      font-family: monospace;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .actions .btn {
      flex: 1;
    }
    
    /* Toggle switch styles */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #334155;
    }
    
    .toggle-row:last-child {
      border-bottom: none;
    }
    
    .toggle-label {
      font-size: 13px;
      color: #e2e8f0;
    }
    
    .toggle-desc {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: 0.3s;
      border-radius: 24px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    .toggle-switch input:checked + .toggle-slider {
      background-color: #3b82f6;
    }
    
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    
    .sse-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
    }
    
    .sse-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
    }
    
    .sse-indicator.active {
      background: #10b981;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <h1><span>📋</span> Council</h1>
  
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking hub...</span>
  </div>
  
  <div class="section">
    <label for="hub-url">Hub URL</label>
    <input type="text" id="hub-url" placeholder="http://127.0.0.1:7337" />
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" id="save-btn">Save</button>
    <button class="btn btn-secondary" id="test-btn">Test</button>
  </div>
  
  <p class="info">
    The hub URL is where Council stores session data. Default: http://127.0.0.1:7337
  </p>
  
  <div class="divider"></div>
  
  <div class="section">
    <label>Notifications (Phase 4)</label>
    
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Auto-draft Pull</div>
        <div class="toggle-desc">Automatically insert digest on milestones</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="auto-pull-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Notify on Patch</div>
        <div class="toggle-desc">Show notification when patches arrive</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="notify-patch-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="sse-status">
      <span class="sse-indicator" id="sse-indicator"></span>
      <span id="sse-status-text">SSE: Idle</span>
      <button class="btn btn-small" id="reconnect-btn" style="margin-left: auto; padding: 4px 10px; font-size: 11px;">
        Reconnect
      </button>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <div class="section">
    <label>Current Session</label>
    <div class="session-info">
      Thread ID: <code id="thread-id">-</code>
    </div>
  </div>
  
  </div>
  
  <div class="divider"></div>
  
  <div class="section">
    <label>Pairing Code</label>
    <p class="help-text">Generate a code to pair CLI with this session</p>
    <div class="pairing-display">
      <code id="pair-code">-</code>
      <span id="pair-expires" class="pair-expires"></span>
    </div>
    <button class="btn btn-primary" id="create-pair-btn">Create Pair Code</button>
  </div>
  
  <script src="panel.js"></script>
</body>
</html>
